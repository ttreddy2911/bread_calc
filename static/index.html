<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calc BREAD Platform</title>
    <meta name="description" content="A secure calculation management platform with BREAD operations.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="auth-screen">
        <div class="auth-card">
            <h1>Calc<span>BREAD</span></h1>
            <p class="auth-subtitle">Secure Calculation Manager</p>

            <div class="tab-bar">
                <button class="tab active" id="tab-login" onclick="switchTab('login')">Login</button>
                <button class="tab" id="tab-register" onclick="switchTab('register')">Register</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label for="login-username">Username</label>
                    <input type="text" id="login-username" required placeholder="yourname">
                </div>
                <div class="input-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                </div>
                <div id="login-error" class="message"></div>
                <button type="submit" class="btn primary full-width" id="login-btn">Login</button>
            </form>

            <!-- Register Form -->
            <form id="register-form" style="display:none;" onsubmit="handleRegister(event)">
                <div class="input-group">
                    <label for="reg-username">Username</label>
                    <input type="text" id="reg-username" required placeholder="yourname">
                </div>
                <div class="input-group">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" required placeholder="you@email.com">
                </div>
                <div class="input-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" required placeholder="••••••••">
                </div>
                <div id="register-error" class="message"></div>
                <button type="submit" class="btn primary full-width" id="register-btn">Create Account</button>
            </form>
        </div>
    </div>

    <!-- DASHBOARD (shown after login) -->
    <div id="dashboard" class="app-container" style="display:none;">
        <header>
            <div class="logo"><h1>Calc<span>BREAD</span></h1></div>
            <div class="user-info">
                <span id="logged-in-user">Welcome!</span>
                <button class="btn secondary small" onclick="logout()">Logout</button>
            </div>
        </header>

        <main>
            <section class="card form-section">
                <h2 id="form-title">New Calculation</h2>
                <form id="calc-form" onsubmit="handleCalcSubmit(event)">
                    <input type="hidden" id="calc-id">
                    <div class="input-group">
                        <label for="operand1">Operand 1</label>
                        <input type="number" id="operand1" step="any" required>
                    </div>
                    <div class="input-group">
                        <label for="operation">Operation</label>
                        <select id="operation" required>
                            <option value="add">Add (+)</option>
                            <option value="subtract">Subtract (−)</option>
                            <option value="multiply">Multiply (×)</option>
                            <option value="divide">Divide (÷)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="operand2">Operand 2</label>
                        <input type="number" id="operand2" step="any" required>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn primary" id="submit-btn">Calculate</button>
                        <button type="button" class="btn secondary" id="cancel-btn" style="display:none;" onclick="resetForm()">Cancel</button>
                    </div>
                </form>
                <div id="form-message" class="message"></div>
            </section>

            <section class="card list-section">
                <h2>Your Calculations</h2>
                <div class="table-responsive">
                    <table id="calc-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Operand 1</th>
                                <th>Operation</th>
                                <th>Operand 2</th>
                                <th>Result</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="calc-tbody"></tbody>
                    </table>
                </div>
                <div id="list-message" class="message"></div>
            </section>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
